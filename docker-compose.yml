services:
  vinobuzz-pipeline:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: vinobuzz-app
    network_mode: host
    environment:
      - NODE_ENV=production
      - PORT=3002
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SERPAPI_KEY=${SERPAPI_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - APP_URL=${APP_URL:-http://localhost:3002}
    restart: unless-stopped
    # Persist wine catalog data between restarts
    volumes:
      - wine-data:/app/public/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

volumes:
  wine-data:
