version: '3.8'

services:
  vinobuzz-pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vinobuzz-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SERPAPI_KEY=${SERPAPI_KEY}
    restart: always
    # Uncomment if you want to use a volume for local logs or data
    # volumes:
    #   - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    name: vinobuzz-network
