services:
  vinobuzz-pipeline:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: vinobuzz-app
    ports:
      - "3002:3000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SERPAPI_KEY=${SERPAPI_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - APP_URL=${APP_URL:-http://localhost:3002}
    restart: unless-stopped
    # Persist wine catalog data between restarts
    volumes:
      - wine-data:/app/public/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

volumes:
  wine-data:

networks:
  default:
    name: vinobuzz-network
